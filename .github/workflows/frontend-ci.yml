name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint:fix

      - name: Format check
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Tests are pending future setup for this frontend base.

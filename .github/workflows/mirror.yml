name: Mirror to GitLab

on:
  push:
    branches:
      - main
      - develop

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/mapa-digital/mapa-digital-frontend.git
          git push gitlab HEAD:${{ github.ref_name }}
          git push gitlab --tags

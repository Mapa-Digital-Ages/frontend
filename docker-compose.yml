services:
  frontend:
    container_name: mapa-digital-frontend
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
